  <!-- Quick access to the Admin Console for local admin login (kept intentionally tiny and tucked to the left) -->
  <div style="position:fixed;left:8px;bottom:86px;z-index:9999;pointer-events:auto">
    <button id="open-admin-console" aria-hidden="true" title="Open Admin Console"
      style="width:10px;height:10px;padding:0;border-radius:2px;border:0;background:transparent;color:transparent;opacity:0.04;font-weight:800;box-shadow:none;cursor:pointer;outline:none">
    </button>
  </div>
  <script>
    (function(){
      const btn = document.getElementById('open-admin-console');
      if(!btn) return;
      btn.addEventListener('click', function(){
        try{
          window.open('./admin.html', '_blank');
        }catch(e){
          window.location.href = './admin.html';
        }
      });
    })();
  </script>
